<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RLM · Recursive Language Models</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --text:#e6e8ec; --muted:#9aa3b2; --accent:#7aa2f7; --ok:#9ece6a; --err:#f7768e;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  header { padding:18px 24px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:17px; font-weight:600; }
  header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
  main { display:grid; grid-template-columns:minmax(380px,1fr) minmax(420px,1.3fr);
    gap:0; height:calc(100vh - 71px); }
  .left { padding:20px 24px; border-right:1px solid var(--line); overflow:auto; }
  .right { padding:20px 24px; overflow:auto; }
  label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px;
    text-transform:uppercase; letter-spacing:.04em; }
  textarea, input[type=text], input[type=number] { width:100%; background:var(--panel);
    color:var(--text); border:1px solid var(--line); border-radius:8px; padding:10px 12px;
    font-size:14px; font-family:inherit; }
  textarea { min-height:240px; resize:vertical; font-family:var(--mono); font-size:13px; }
  .row { display:flex; gap:12px; }
  .row > div { flex:1; }
  button { margin-top:16px; background:var(--accent); color:#0b0e14; border:0;
    border-radius:8px; padding:11px 18px; font-size:14px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .hint { color:var(--muted); font-size:12px; margin-top:8px; }
  #status { margin:0 0 14px; font-size:13px; color:var(--muted); min-height:18px; }
  .answer { background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--ok);
    border-radius:8px; padding:14px 16px; white-space:pre-wrap; }
  .answer h3 { margin:0 0 8px; font-size:12px; color:var(--ok); text-transform:uppercase;
    letter-spacing:.04em; }
  .meta { color:var(--muted); font-size:12px; margin-top:10px; }
  .turn { background:var(--panel); border:1px solid var(--line); border-radius:8px;
    padding:12px 14px; margin-bottom:12px; }
  .turn .tag { font-size:11px; color:var(--accent); font-weight:600; text-transform:uppercase;
    letter-spacing:.05em; margin-bottom:6px; }
  .turn .resp { white-space:pre-wrap; font-size:13px; }
  .block { margin-top:10px; }
  .block pre { margin:6px 0 0; background:var(--panel2); border:1px solid var(--line);
    border-radius:6px; padding:9px 11px; overflow:auto; font-family:var(--mono); font-size:12px;
    white-space:pre-wrap; }
  .block .out { border-left:2px solid var(--muted); }
  .block .out.err { border-left-color:var(--err); color:var(--err); }
  .block .out.final { border-left-color:var(--ok); color:var(--ok); }
  .depth { margin-left:18px; border-left:2px solid var(--line); padding-left:12px; }
  .empty { color:var(--muted); font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>Recursive Language Models</h1>
  <p>The root model never reads the context — it works it through a Python REPL, fanning out to sub-LLM calls.</p>
</header>
<main>
  <section class="left">
    <label for="context">Context (the long input the model works over)</label>
    <textarea id="context" placeholder="Paste a long document, transcript, or list here…"></textarea>
    <label for="question">Question</label>
    <input id="question" type="text" placeholder="What do you want to know about the context?" />
    <div class="row">
      <div>
        <label for="iters">Max turns</label>
        <input id="iters" type="number" value="12" min="1" max="40" />
      </div>
      <div>
        <label for="depth">Max depth</label>
        <input id="depth" type="number" value="1" min="1" max="3" />
      </div>
    </div>
    <button id="run">Run RLM</button>
    <div class="hint">Calls the Claude API (root: opus-4.8, sub-calls: haiku-4.5). A run can take a little while.</div>
    <button id="sample" style="background:var(--panel2);color:var(--text);border:1px solid var(--line);">Load needle-in-haystack sample</button>
  </section>
  <section class="right">
    <div id="status"></div>
    <div id="answer"></div>
    <div id="trajectory"><div class="empty">The turn-by-turn trajectory will appear here.</div></div>
  </section>
</main>
<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => (s ?? "").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

$("sample").onclick = () => {
  const paras = [];
  for (let i = 0; i < 400; i++) {
    let p = `[Section ${String(i).padStart(3,"0")}] The quarterly logistics review noted nominal throughput across all regional distribution hubs, with no material exceptions to report.`;
    if (i === 247) p += " Internal note: the access code for the east vault is MAGENTA-7741.";
    paras.push(p);
  }
  $("context").value = paras.join("\n\n");
  $("question").value = "What is the access code for the east vault?";
};

function renderTrajectory(turns) {
  if (!turns.length) return '<div class="empty">No REPL turns were produced.</div>';
  return turns.map(t => {
    const blocks = (t.blocks || []).map(b => {
      let out = "";
      if (b.code) out += `<pre>${esc(b.code)}</pre>`;
      if (b.stdout) out += `<pre class="out">${esc(b.stdout)}</pre>`;
      if (b.stderr) out += `<pre class="out err">${esc(b.stderr)}</pre>`;
      if (b.final_answer != null) out += `<pre class="out final">answer ready → ${esc(b.final_answer)}</pre>`;
      return `<div class="block">${out}</div>`;
    }).join("");
    const cls = t.depth > 0 ? "turn depth" : "turn";
    const tag = `Turn ${t.iteration}/${t.max_iterations}` + (t.depth > 0 ? ` · depth ${t.depth}` : "");
    return `<div class="${cls}"><div class="tag">${tag}</div>
      <div class="resp">${esc(t.response)}</div>${blocks}</div>`;
  }).join("");
}

$("run").onclick = async () => {
  const context = $("context").value;
  if (!context.trim()) { $("status").textContent = "Please provide some context."; return; }
  $("run").disabled = true;
  $("answer").innerHTML = "";
  $("trajectory").innerHTML = "";
  $("status").textContent = "Running… the model is working through the REPL.";
  const t0 = performance.now();
  try {
    const res = await fetch("/api/complete", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        context,
        question: $("question").value,
        max_iterations: +$("iters").value,
        max_depth: +$("depth").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    const secs = ((performance.now() - t0)/1000).toFixed(1);
    $("status").textContent = "";
    $("answer").innerHTML = `<div class="answer"><h3>Answer</h3>${esc(data.answer)}
      <div class="meta">${data.iterations} turns · ${data.usage.calls} model calls ·
      ${data.usage.input_tokens.toLocaleString()} in / ${data.usage.output_tokens.toLocaleString()} out tokens ·
      ${secs}s · ${esc(data.root_model)}</div></div>`;
    $("trajectory").innerHTML = renderTrajectory(data.trajectory);
  } catch (e) {
    $("status").innerHTML = `<span style="color:var(--err)">Error: ${esc(e.message)}</span>`;
  } finally {
    $("run").disabled = false;
  }
};
</script>
</body>
</html>
